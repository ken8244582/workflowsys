<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #1e3a5f;
      --color-primary-container:    #d0e2f2;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #f8fafc;
      --color-surface-container-lowest:   #ffffff;
      --color-surface:                    #ffffff;
      --color-surface-container:          #f1f5f9;
      --color-surface-container-high:     #e2e8f0;
      --color-surface-container-highest:  #cbd5e1;
      /* === 文字 === */
      --color-on-surface:           #1e293b;
      --color-on-surface-variant:   #64748b;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #cbd5e1;
      --color-outline-variant:  #e2e8f0;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.18);
      /* === 字体 === */
      --font-sans: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

    </div>
    <nav class="flex items-center gap-1">
      <a href="home.html" class="px-3 py-1.5 text-sm font-medium text-on-primary/70 hover:text-on-primary hover:bg-on-primary/10 rounded-md transition-colors">统计概览</a>
      <a href="architecture.html" class="px-3 py-1.5 text-sm font-medium text-on-primary bg-on-primary/15 rounded-md" aria-current="page">流程架构</a>
      <a href="list.html" class="px-3 py-1.5 text-sm font-medium text-on-primary/70 hover:text-on-primary hover:bg-on-primary/10 rounded-md transition-colors">流程清单</a>
      <a href="revision.html" class="px-3 py-1.5 text-sm font-medium text-on-primary/70 hover:text-on-primary hover:bg-on-primary/10 rounded-md transition-colors">修订记录</a>
      <a href="plan.html" class="px-3 py-1.5 text-sm font-medium text-on-primary/70 hover:text-on-primary hover:bg-on-primary/10 rounded-md transition-colors">修订计划</a>
    </nav>
    <div class="flex items-center gap-3">
      <span class="text-sm text-on-primary/80">管理员</span>
      <div class="w-8 h-8 rounded-full bg-on-primary/20 text-on-primary flex items-center justify-center text-sm font-medium">管</div>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <!-- @main-content:start -->
  <main class="flex-1 min-w-0 overflow-y-auto bg-background p-6">
    <!-- 页面内容 -->
  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>

</html>
